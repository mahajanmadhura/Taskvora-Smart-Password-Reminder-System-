<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Taskvora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/sweet-theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quick-buttons.css">
</head>
<body>
    <!-- Quick Actions -->
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">
                            <i class="fas fa-bolt me-2"></i>Quick Actions
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3 mb-3">
                                <button class="btn btn-outline-primary w-100 py-3 quick-action-btn" 
                                        id="quickAddPassword">
                                    <i class="fas fa-plus-circle fa-2x mb-2"></i><br>Add Password
                                </button>
                            </div>
                            <div class="col-md-3 mb-3">
                                <button class="btn btn-outline-warning w-100 py-3 quick-action-btn" 
                                        id="quickAddReminder">
                                    <i class="fas fa-bell fa-2x mb-2"></i><br>Add Reminder
                                </button>
                            </div>
                            <div class="col-md-3 mb-3">
                                <button class="btn btn-outline-info w-100 py-3 quick-action-btn" 
                                        id="quickWorkNotes">
                                    <i class="fas fa-sticky-note fa-2x mb-2"></i><br>Work Notes
                                </button>
                            </div>
                            <div class="col-md-3 mb-3">
                                <button class="btn btn-outline-success w-100 py-3 quick-action-btn" 
                                        id="quickUploadExcel">
                                    <i class="fas fa-file-excel fa-2x mb-2"></i><br>Upload Excel
                                </button>
                                <input type="file" id="excelFileInput" accept=".xlsx,.xls,.xlsm" style="display:none;" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Upcoming Reminders -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">
                            <i class="fas fa-bell me-2"></i>Upcoming Reminders
                        </h6>
                        <a href="#" class="btn btn-sm btn-outline-warning" id="viewAllReminders">View All</a>
                    </div>
                    <div class="card-body">
                        <div id="remindersList">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard-main.js"></script>
</body>
</html>
